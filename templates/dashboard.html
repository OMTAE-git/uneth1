<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADA Compliance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: #c9d1d9; }
        .card { background: #161b22; border: 1px solid #30363d; }
        .stat-card { text-align: center; padding: 20px; }
        .stat-number { font-size: 2.5rem; font-weight: bold; }
        .compliant { color: #3fb950; }
        .non-compliant { color: #f85149; }
        .table { color: #c9d1d9; }
        .table-hover tbody tr:hover { background: #21262d; }
        .btn-primary { background: #238636; border: none; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; border: none; }
        .status-badge { padding: 5px 10px; border-radius: 12px; font-size: 0.85rem; }
        .status-compliant { background: #238636; }
        .status-non-compliant { background: #da3633; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: #161b22; border-bottom: 1px solid #30363d;">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">ADA Compliance Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="refreshData()">Refresh</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="runCycle()">Run Cycle</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card stat-card">
                    <h5>Total Sites</h5>
                    <div class="stat-number" id="total-sites">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <h5>Compliant</h5>
                    <div class="stat-number compliant" id="compliant-sites">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <h5>Non-Compliant</h5>
                    <div class="stat-number non-compliant" id="non-compliant-sites">0</div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Monitored Sites</h5>
                <button class="btn btn-primary btn-sm" onclick="showAddModal()">+ Add Site</button>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>URL</th>
                            <th>Issues</th>
                            <th>Status</th>
                            <th>Last Checked</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sites-table"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Activity Log</h5>
            </div>
            <div class="card-body">
                <div id="activity-log" style="max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 0.85rem;">
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addSiteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="background: #161b22; color: #c9d1d9;">
                <div class="modal-header">
                    <h5 class="modal-title">Add Website</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">URL</label>
                        <input type="url" class="form-control" id="site-url" placeholder="https://example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Name (optional)</label>
                        <input type="text" class="form-control" id="site-name" placeholder="My Website">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Email</label>
                        <input type="email" class="form-control" id="site-email" placeholder="admin@example.com">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addSite()">Add Site</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let modal;
        document.addEventListener('DOMContentLoaded', () => {
            modal = new bootstrap.Modal(document.getElementById('addSiteModal'));
            refreshData();
            setInterval(refreshData, 30000);
        });

        async function refreshData() {
            try {
                const res = await fetch('/api/status');
                const status = await res.json();
                document.getElementById('total-sites').textContent = status.total_sites;
                document.getElementById('compliant-sites').textContent = status.compliant;
                document.getElementById('non-compliant-sites').textContent = status.non_compliant;
            } catch (e) {
                log('Error fetching status');
            }

            try {
                const res = await fetch('/api/sites');
                const sites = await res.json();
                const tbody = document.getElementById('sites-table');
                tbody.innerHTML = sites.map(site => `
                    <tr>
                        <td><a href="${site.url}" target="_blank">${site.url}</a></td>
                        <td>${site.issue_count || 0}</td>
                        <td>
                            <span class="status-badge ${site.status === 'compliant' ? 'status-compliant' : 'status-non-compliant'}">
                                ${site.status || 'Unknown'}
                            </span>
                        </td>
                        <td>${site.last_checked || 'Never'}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="checkSite('${site.url}')">Check</button>
                            <button class="btn btn-sm btn-danger" onclick="removeSite('${site.url}')">Remove</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                log('Error fetching sites');
            }
        }

        function showAddModal() { modal.show(); }

        async function addSite() {
            const url = document.getElementById('site-url').value;
            const name = document.getElementById('site-name').value;
            const email = document.getElementById('site-email').value;
            
            if (!url) return alert('URL required');
            
            await fetch('/api/sites', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url, name, email})
            });
            
            modal.hide();
            refreshData();
            log(`Added site: ${url}`);
        }

        async function removeSite(url) {
            if (!confirm('Remove this site?')) return;
            await fetch(`/api/sites/${encodeURIComponent(url)}`, {method: 'DELETE'});
            refreshData();
            log(`Removed site: ${url}`);
        }

        async function checkSite(url) {
            log(`Checking ${url}...`);
            await fetch(`/api/check/${encodeURIComponent(url)}`);
            refreshData();
            log(`Check complete: ${url}`);
        }

        async function runCycle() {
            log('Starting autonomous cycle...');
            const res = await fetch('/api/run-cycle', {method: 'POST'});
            const data = await res.json();
            if (data.error) {
                log('Error: ' + data.error);
            } else {
                log(`Cycle complete. Scanned: ${data.stats.sites_scanned}, Non-compliant: ${data.stats.non_compliant}`);
            }
            refreshData();
        }

        function log(msg) {
            const log = document.getElementById('activity-log');
            const time = new Date().toLocaleTimeString();
            log.innerHTML = `<div>[${time}] ${msg}</div>` + log.innerHTML;
        }
    </script>
</body>
</html>
